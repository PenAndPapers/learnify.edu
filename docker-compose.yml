name: "learnify.edu"
services:
  gateway:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "80:80"  # Exposes the Nginx gateway to the public internet
    depends_on:
      api:
        condition: service_healthy # Wait until the API healthcheck passes before routing traffic
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro # Mount config for easy hot-reloads
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/fastapi/Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    expose: # Used 'ports' with 'expose' so it's isolated within the internal Docker network
      - "8000"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=database
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_HOST=cache
      - REDIS_PORT=${REDIS_PORT}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/check-health"]
      interval: 10s
      timeout: 5s
      retries: 3
    user: "${UID:-1000}:${GID:-1000}"

  database:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    volumes:
      - database_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  cache:
    build:
      context: ./infra/redis
      dockerfile: Dockerfile
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  database_data:
  cache_data: