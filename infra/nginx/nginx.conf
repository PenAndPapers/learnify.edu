# Define a rate limiting zone based on the client's IP address ($binary_remote_addr)
# 10m (10 megabytes) can store roughly 160,000 unique IP addresses in memory.
# rate=10r/s means a maximum of 10 requests per second are allowed per IP.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Turn off Nginx version tokens in error pages/headers for security obfuscation
    server_tokens off;

    location / {
        # Apply the rate limiting zone here
        # burst=5 means if a user bursts over 10r/s, up to 5 requests are queued up.
        # nodelay means those 5 burst requests are processed instantly rather than delayed.
        # Any request beyond the burst allocation gets an immediate HTTP 429 Too Many Requests.
        limit_req zone=api_limit burst=5 nodelay;

        # Forward the traffic to your FastAPI container
        # "api" matches the service name we will use in docker-compose.yml
        proxy_pass http://api:8000;
        
        # Forward crucial client headers so FastAPI knows the real user details
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
